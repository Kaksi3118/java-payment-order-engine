# ArchUnit configuration.
#
# Rules whose `that()` clause matches zero classes (a "vacuously satisfied" rule)
# would otherwise fail the build, defending against accidental typos in package
# name patterns. During early scaffolding stages, several guardrails target
# packages that do not yet contain any classes (e.g. `..application..`,
# `..adapters.in..`). We disable this defensive check so the guardrails stay
# green and silently activate the first time a matching class is added.
archRule.failOnEmptyShould=false