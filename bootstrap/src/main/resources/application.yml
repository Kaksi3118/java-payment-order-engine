spring:
  application:
    name: payment-order-engine
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POE_POSTGRES_HOST:localhost}:${POE_POSTGRES_PORT:5432}/${POE_POSTGRES_DB:poe}
    username: ${POE_POSTGRES_USER:poe}
    password: ${POE_POSTGRES_PASSWORD:poe_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

identity:
  jwt:
    access-token-ttl: PT30M
    refresh-token-ttl: PT24H

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized