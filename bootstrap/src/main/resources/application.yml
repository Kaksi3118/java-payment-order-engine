spring:
  application:
    name: payment-order-engine
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POE_POSTGRES_HOST:localhost}:${POE_POSTGRES_PORT:5432}/${POE_POSTGRES_DB:poe}
    username: ${POE_POSTGRES_USER:poe}
    password: ${POE_POSTGRES_PASSWORD:poe_dev_password}
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

identity:
  jwt:
    access-token-ttl: PT30M
    refresh-token-ttl: PT24H

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

resilience4j:
  circuitbreaker:
    instances:
      payment-gateway:
        failureRateThreshold: 50
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
  retry:
    instances:
      payment-gateway:
        maxAttempts: 5
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
  ratelimiter:
    instances:
      payment-gateway:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
  bulkhead:
    instances:
      payment-gateway:
        maxConcurrentCalls: 20
        maxWaitDuration: 1s