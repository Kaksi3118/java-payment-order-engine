spring:
  application:
    name: payment-order-engine
  threads:
    virtual:
      enabled: true

server:
  port: 8080

identity:
  jwt:
    access-token-ttl: PT30M
    refresh-token-ttl: PT24H

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized